<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="workers.css">
</head>
<body>
    <!-- Блок "Наши сотрудники" -->
<section class="team">
  <h2 class="team__title">Наши сотрудники</h2>

  <div class="team__slider">
    <div class="team__card">
      <div class="team__card-top"></div>
      <div class="team__card-body">
        <div class="team__member">
          <img src="img/Ellipse 27.png" alt="Сотрудник" class="team__avatar" />
          <span class="team__name">Шамиль Хусейн</span>
        </div>
        <p class="team__desc">Разрабатывает направления для путешествия</p>
      </div>
      <div class="team__dots">
        <span class="team__dot"></span>
        <span class="team__dot"></span>
        <span class="team__dot active"></span>
        <span class="team__dot"></span>
      </div>
    </div>
  </div>
</section>
</body>
</html>
