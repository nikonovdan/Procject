<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="block2.css">
</head>

<body>
    <!-- Блок "Лучшие направления" -->

            <a href="#" class="destinations__btn">Далее</a>
        </div>

        <div class="destinations__cards">
            <div class="destinations__card">
                <img src="img/cuba.png" alt="Cuba">
                <span class="destinations__card-label">Cuba City</span>
            </div>
            <div class="destinations__card">
                <img src="img/paris.png" alt="Paris" />
                <span class="destinations__card-label">Paris</span>
            </div>
            <div class="destinations__card">
                <img src="img/japan.png" alt="Japan" />
                <span class="destinations__card-label">Japan</span>
            </div>
        </div>
    </section>
