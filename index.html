<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="css/sytle.css">
</head>

<body>
    <div class="desktop">
        <div class="top-destination">
            <div class="bg"></div>
            <div class="place">
                <div class="image-here"></div>
                <img class="japan" src="img/japan.png" />
                <div class="overlay-bg"></div>
                <div class="text-wrapper">Japan</div>
            </div>
            <div class="div">
                <div class="image-here-2"></div>
                <img class="img-2" src="img/paris.png" />
                <div class="overlay-bg-2"></div>
                <div class="text-wrapper-2">Paris</div>
            </div>
            <div class="place-2">
                <div class="image-here-2"></div>
                <img class="img-2" src="img/cuba.png" />
                <div class="overlay-bg-2"></div>
                <div class="text-wrapper-3">Cuba City</div>
            </div>
            <div class="discover-btn">
                <div class="btn-bg"></div>
                <div class="text-wrapper-4">Далее</div>
            </div>
            <div class="title">
                <div class="text-wrapper-5">Лучшие направления</div>
            </div>
        </div>
        <div class="hero-banner-search">
            <div class="hero-banner-image"><img src="img/background.png" alt="background"></div>
            <div class="plan-trip-btn">
                <div class="btn-bg-2"></div>
                <div class="text-wrapper-6">Запланировать поезкду</div>
            </div>
            <div class="hero-text">
                <div class="text-wrapper-7">Время иследовать мир</div>
            </div>
            <div class="search-box">
                <div class="bg-2"></div>
                <div class="discover-btn-2">
                    <div class="btn-bg-3"></div>
                    <div class="text-wrapper-8">Иследуй сейчас</div>
                </div>
                <div class="price">
                    <div class="div-2"></div>
                    <div class="dollar-sign"></div>
                    <div class="div-wrapper">
                        <div class="text-wrapper-9">$500 - $10,0000</div>
                    </div>
                    <div class="range">
                        <div class="text-wrapper-10">Цена</div>
                    </div>
                </div>
                <div class="checkin">
                    <div class="div-2"></div>
                    <div class="date">
                        <div class="text-wrapper-11">01 фев 2026</div>
                        <div class="calender"></div>
                    </div>
                    <div class="destinations-2">
                        <div class="text-wrapper-12">Регистрация</div>
                    </div>
                </div>
                <div class="place-3">
                    <div class="place-name">
                        <div class="text-wrapper-13">Арабский Египет</div>
                    </div>
                    <div class="destinations-3">
                        <div class="text-wrapper-14">Направления</div>
                    </div>
                </div>
            </div>
        </div>
        <header class="header">
            <div class="menu-text">
                <div class="text-wrapper-15">Направления</div>
            </div>
            <img class="img" src="img/logo.png" />
        </header>
        <div class="text-wrapper-16">Туры</div>
        <div class="text-wrapper-17">Обратная связь</div>
        <div class="testimonial">
            <div class="rectangle-wrapper">
                <div class="rectangle"></div>
            </div>
            <div class="text-wrapper-18">Разрабатывает направления для путешествия</div>
            <div class="client"><img class="ellipse-2" src="img/Ellipse 27.png" />
                <div class="text-wrapper-19">Шамиль Хусейн</div>
            </div>
            <div class="title-2">
                <div class="text-wrapper-20">Наши сотрудники</div>
            </div>
            <div class="group">
                <div class="ellipse-3"></div>
                <div class="ellipse-4"></div>
                <div class="ellipse-5"></div>
                <div class="ellipse-6"></div>
                <div class="ellipse-7"></div>
            </div>
        </div>
        <footer class="footer">
            <div class="footer-container">
                <div class="footer-brand">
                    <img src="img/logo.png" alt="logotip">
                </div>
            </div>
        </footer>
    </div>
</body>

</html>
</body>

</html>
